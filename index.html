<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f9f9f8" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Strata">
<link rel="manifest" href="manifest.json">
<title>Strata</title>
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --bg:     #f9f9f8;
  --bg1:    #f2f2f0;
  --bg2:    #e4e4e0;
  --text:   #1a1a18;
  --text2:  #6b6b66;
  --text3:  #a8a8a0;
  --border: rgba(0,0,0,0.07);
  --borderB:rgba(0,0,0,0.13);
  --r:      12px;
  --accent: #5b5ef4;
  --a-bg:   #eeeeff;
  --a-lt:   rgba(91,94,244,.1);

  --teal:   #00b4a0; --teal-bg: #e6faf8; --teal-t: #007d6f;
  --violet: #8b5cf6; --violet-bg:#f3eeff; --violet-t:#6d28d9;
  --amber:  #f59e0b; --amber-bg: #fff8e6; --amber-t: #b45309;
  --rose:   #f43f5e; --rose-bg:  #fff0f3; --rose-t:  #be123c;
  --blue:   #3b82f6; --blue-bg:  #eff6ff; --blue-t:  #1d4ed8;
  --indigo: #6366f1; --indigo-bg:#eef2ff; --indigo-t:#4338ca;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#18181b; --bg1:#27272a; --bg2:#3f3f46;
    --text:#fafaf9; --text2:#a1a1aa; --text3:#71717a;
    --border:rgba(255,255,255,0.06); --borderB:rgba(255,255,255,0.12);
    --accent:#818cf8; --a-bg:#1e1b4b;
    --teal-bg:#042f2e; --teal-t:#2dd4bf;
    --violet-bg:#2e1065; --violet-t:#c4b5fd;
    --amber-bg:#451a03; --amber-t:#fcd34d;
    --rose-bg:#4c0519; --rose-t:#fda4af;
    --blue-bg:#1e3a5f; --blue-t:#93c5fd;
    --indigo-bg:#1e1b4b; --indigo-t:#a5b4fc;
  }
}

/* ── RESET ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
input,button,textarea,select{font-family:inherit}
input,textarea,select{font-size:16px;touch-action:manipulation}

/* ── SHELL ───────────────────────────────────────────────── */
#root{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{padding:env(safe-area-inset-top,16px) 16px 0;background:var(--bg);border-bottom:.5px solid var(--border);flex-shrink:0;z-index:10}
.hdr-inner{display:flex;align-items:center;gap:8px;padding:10px 0;min-height:48px}
.hdr-back{background:none;border:none;color:var(--accent);font-size:15px;font-weight:500;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center;gap:2px;flex-shrink:0}
.hdr-back::before{content:'‹';font-size:22px;line-height:1;margin-right:1px}
.hdr-titles{flex:1;min-width:0}
.hdr-title{font-size:17px;font-weight:600;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:12px;color:var(--text3);margin-top:1px}
.hdr-act{background:none;border:none;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;padding:4px 0 4px 8px;flex-shrink:0}

/* ── CONTENT ─────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 72px)}

/* ── BOTTOM NAV ──────────────────────────────────────────── */
.nav{display:flex;background:var(--bg);border-top:.5px solid var(--border);padding:8px 0 env(safe-area-inset-bottom,8px);flex-shrink:0;z-index:10}
.nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;cursor:pointer;color:var(--text3);transition:color .15s}
.nav-btn.on{color:var(--accent)}
.nav-icon{font-size:22px;line-height:1}
.nav-lbl{font-size:10px;font-weight:500;letter-spacing:.15px}

/* ── CARD ────────────────────────────────────────────────── */
.card{background:var(--bg1);border:.5px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;margin-bottom:10px}
.tappable{cursor:pointer}
.tappable:active{opacity:.65}

/* ── PROGRESS BAR ────────────────────────────────────────── */
.bar{height:4px;background:var(--bg2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}

/* ── CHECKLIST ITEM ──────────────────────────────────────── */
.item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.item:last-child{border-bottom:none}
.item:active{opacity:.65}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--borderB);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--bg)}
.item.done .chk{background:var(--accent);border-color:var(--accent)}
.item.done .chk::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.item-body{flex:1;min-width:0}
.item-title{font-size:14px;font-weight:500;line-height:1.4;color:var(--text)}
.item.done .item-title{text-decoration:line-through;color:var(--text3)}
.item-sub{font-size:12px;color:var(--text3);margin-top:2px}
.item-note{font-size:13px;color:var(--text3);margin-top:3px;line-height:1.4}
.item-time{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;margin-left:5px}

/* ── ROADMAP ROW ─────────────────────────────────────────── */
.rm-row{display:flex;gap:12px;align-items:stretch}
.color-strip{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch}
.rm-body{flex:1;min-width:0}

/* ── GOAL ROW ────────────────────────────────────────────── */
.g-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.g-row:last-child{border-bottom:none}
.g-row:active{opacity:.65}
.g-info{flex:1;min-width:0}
.g-title{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:3px}
.g-meta{font-size:12px;color:var(--text3)}
.g-pct{font-size:13px;font-weight:700;min-width:36px;text-align:right;flex-shrink:0}
.chevron{color:var(--text3);font-size:16px;flex-shrink:0}

/* ── TYPE BADGE ──────────────────────────────────────────── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;vertical-align:middle;margin-left:5px}

/* ── BLOCK CARD ──────────────────────────────────────────── */
.blk{background:var(--bg1);border:.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.blk-hd{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 16px 10px}
.blk-title{font-size:15px;font-weight:600}
.blk-time{font-size:11px;color:var(--text3);margin-top:2px}
.blk-prog{font-size:13px;font-weight:600;color:var(--text2);flex-shrink:0}
.blk-body{padding:0 16px 12px}

/* ── INLINE FORM ─────────────────────────────────────────── */
.form-wrap{background:var(--bg1);border:.5px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.form-title{font-size:14px;font-weight:600;margin-bottom:12px}
.inp{width:100%;border:.5px solid var(--borderB);border-radius:8px;padding:9px 11px;font-size:16px;color:var(--text);background:var(--bg);outline:none;margin-bottom:8px;-webkit-appearance:none}
.inp:focus{border-color:var(--accent);outline:2px solid var(--a-lt)}
.row{display:flex;gap:8px;align-items:center}
.row-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;font-size:13px;font-weight:500;border-radius:8px;border:.5px solid var(--borderB);background:var(--bg1);color:var(--text);cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn:active{opacity:.65}
.btn-acc{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:none;border:none;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:5px}
.btn-ghost::before{content:'+';font-size:18px;font-weight:300;line-height:1}
.btn-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:4px 6px;flex-shrink:0;line-height:1}

/* ── CHIP SELECTOR ───────────────────────────────────────── */
.chip{padding:5px 11px;border-radius:99px;border:1px solid var(--borderB);background:var(--bg1);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── COLOR DOTS ──────────────────────────────────────────── */
.cdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;flex-shrink:0}
.cdot.on{border-color:var(--text);box-shadow:0 0 0 2px var(--bg)}

/* ── STATS ROW ───────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg1);border:.5px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:700;line-height:1.1}
.stat-l{font-size:10px;color:var(--text3);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

/* ── SECTION LABEL ───────────────────────────────────────── */
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;margin-top:4px}
.sec-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;margin-top:4px}

/* ── SVG RING ────────────────────────────────────────────── */
.ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty{text-align:center;padding:48px 24px 32px;color:var(--text3)}
.empty-ico{font-size:52px;margin-bottom:14px}
.empty-h{font-size:15px;font-weight:500;color:var(--text2);margin-bottom:4px}
.empty-s{font-size:13px;line-height:1.5}

/* ── NOTES ───────────────────────────────────────────────── */
.ta{width:100%;border:.5px solid var(--borderB);border-radius:10px;padding:11px 12px;font-size:16px;color:var(--text);background:var(--bg);line-height:1.6;outline:none;resize:none;-webkit-appearance:none}
.ta:focus{border-color:var(--accent)}

/* ── ICON GRID ───────────────────────────────────────────── */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.ico-opt{background:var(--bg);border:.5px solid var(--borderB);border-radius:8px;padding:6px;text-align:center;font-size:18px;cursor:pointer}
.ico-opt.on{background:var(--a-bg);border-color:var(--accent)}

/* ── ROUTINE DAILY NOTE INPUT ────────────────────────────── */
.rtn-note{width:100%;border:none;border-bottom:.5px solid var(--border);background:transparent;font-size:13px;color:var(--text3);padding:4px 0 3px;outline:none;margin-top:4px;-webkit-appearance:none}
.rtn-note:focus{border-color:var(--accent)}
.rtn-note::placeholder{color:var(--text3);opacity:.6}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════
//  STRATA  ·  Personal Progress System
// ═══════════════════════════════════════════════════════════

// ── CONSTANTS ────────────────────────────────────────────
const COLOR_NAMES = ['teal','violet','amber','rose','blue','indigo']
const COLOR_HEX   = {teal:'#00b4a0',violet:'#8b5cf6',amber:'#f59e0b',rose:'#f43f5e',blue:'#3b82f6',indigo:'#6366f1'}
const COLOR_GRAD  = {
  teal:   'linear-gradient(135deg,#00b4a0,#34d9c3)',
  violet: 'linear-gradient(135deg,#8b5cf6,#a78bfa)',
  amber:  'linear-gradient(135deg,#f59e0b,#fcd34d)',
  rose:   'linear-gradient(135deg,#f43f5e,#fb7185)',
  blue:   'linear-gradient(135deg,#3b82f6,#60a5fa)',
  indigo: 'linear-gradient(135deg,#6366f1,#818cf8)'
}
const ICONS = ['💼','🎓','💪','🧪','🎨','📚','🏃','🧘','🌱','💡','✍️','⭐','🏋️','🩺','🔬','🎯','🚀','📐']
const BLOCKS = [
  {key:'morning', label:'Morning', time:'5 – 9 AM',    emoji:'🌅'},
  {key:'day',     label:'Day',     time:'9 AM – 5 PM', emoji:'☀️'},
  {key:'evening', label:'Evening', time:'5 PM – Night',emoji:'🌙'}
]
const DAYS_KEYS    = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday']
const DAYS_ORDERED = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday']
const DAYS_LABEL   = {monday:'Monday',tuesday:'Tuesday',wednesday:'Wednesday',thursday:'Thursday',friday:'Friday',saturday:'Saturday',sunday:'Sunday'}

// ── HELPERS ──────────────────────────────────────────────
const uid  = () => Math.random().toString(36).slice(2, 10)
const td   = () => new Date().toISOString().slice(0, 10)

function fmtDate(d) {
  const dt = new Date(d + 'T12:00:00')
  return dt.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})
}
function fmtMonth(m) {
  const [y, mo] = m.split('-')
  return new Date(+y, +mo-1, 1).toLocaleDateString('en-US', {month:'long', year:'numeric'})
}
function nearestMonday(dateStr) {
  const d = new Date(dateStr + 'T12:00:00')
  const day = d.getDay()
  const diff = day === 0 ? 1 : (day === 1 ? 0 : 8 - day)
  d.setDate(d.getDate() + diff)
  return d.toISOString().slice(0, 10)
}
function weekRange(weekOf) {
  const mon = new Date(weekOf + 'T12:00:00')
  const sun = new Date(mon)
  sun.setDate(mon.getDate() + 6)
  const fmt = dt => dt.toLocaleDateString('en-US', {month:'short', day:'numeric'})
  return `${fmt(mon)} – ${fmt(sun)}`
}
function fmtTime(t) {
  if (!t) return ''
  const [h, m] = t.split(':').map(Number)
  const ampm = h < 12 ? 'AM' : 'PM'
  const h12  = h % 12 || 12
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`
}
function timeToBlock(time) {
  if (!time) return 'morning'
  const h = parseInt(time.split(':')[0], 10)
  if (h < 12) return 'morning'
  if (h < 17) return 'day'
  return 'evening'
}
function sortByTime(arr) {
  return [...arr].sort((a, b) => {
    const ta = a.time || '99:99'
    const tb = b.time || '99:99'
    return ta.localeCompare(tb)
  })
}
function todayDayKey() { return DAYS_KEYS[new Date().getDay()] }
function thisWeekBounds() {
  const today = new Date(), day = today.getDay()
  const mon = new Date(today)
  mon.setDate(today.getDate() - (day === 0 ? 6 : day - 1))
  const sun = new Date(mon)
  sun.setDate(mon.getDate() + 6)
  return {mon: mon.toISOString().slice(0,10), sun: sun.toISOString().slice(0,10)}
}
function loadVision(rmId) {
  try { return localStorage.getItem(`strata_vision_${rmId}`) || '' } catch { return '' }
}
function saveVision(rmId, text) {
  try { localStorage.setItem(`strata_vision_${rmId}`, text) } catch(e) {}
}

// ── MAIN STATE ────────────────────────────────────────────
const BLANK = {roadmaps:[], daily:{}, notes:{wins:'',hard:'',adjust:'',ideas:''}}
let S
function loadState() {
  try { S = JSON.parse(localStorage.getItem('strata_v1')) || JSON.parse(JSON.stringify(BLANK)) }
  catch { S = JSON.parse(JSON.stringify(BLANK)) }
}
function persist() {
  try { localStorage.setItem('strata_v1', JSON.stringify(S)) } catch(e) {}
}

// ── ROUTINE STATE ─────────────────────────────────────────
const BLANK_ROUTINES = {monday:[],tuesday:[],wednesday:[],thursday:[],friday:[],saturday:[],sunday:[]}
function loadRoutines() {
  try { return JSON.parse(localStorage.getItem('strata_routines')) || JSON.parse(JSON.stringify(BLANK_ROUTINES)) }
  catch { return JSON.parse(JSON.stringify(BLANK_ROUTINES)) }
}
function saveRoutines(r) {
  try { localStorage.setItem('strata_routines', JSON.stringify(r)) } catch(e) {}
}
function loadDailyRtnState(date) {
  try { return JSON.parse(localStorage.getItem(`strata_daily_${date}_routines`)) || {} }
  catch { return {} }
}
function saveDailyRtnState(date, st) {
  try { localStorage.setItem(`strata_daily_${date}_routines`, JSON.stringify(st)) } catch(e) {}
}
function loadDailyRtnNotes(date) {
  try { return JSON.parse(localStorage.getItem(`strata_daily_${date}_notes`)) || {} }
  catch { return {} }
}
function saveDailyRtnNotes(date, n) {
  try { localStorage.setItem(`strata_daily_${date}_notes`, JSON.stringify(n)) } catch(e) {}
}

// ── COMPUTED ─────────────────────────────────────────────
function weekProg(week) {
  const total = week.days.length
  if (!total) return {done:0,total:0,pct:0,complete:false}
  const done = week.days.filter(d => d.done).length
  return {done, total, pct: Math.round(done/total*100), complete: done===total}
}
function monthProg(month) {
  const total = month.weeks.length
  if (!total) return {done:0,total:0,pct:0,complete:false}
  const done = month.weeks.filter(w => weekProg(w).complete).length
  return {done, total, pct: Math.round(done/total*100), complete: done===total}
}
function rmProg(rm) {
  if (!rm.months.length) return {pct:0}
  const sum = rm.months.reduce((s,m) => s + monthProg(m).pct, 0)
  return {pct: Math.round(sum / rm.months.length)}
}

function aggToday(date) {
  const r = {morning:[], day:[], evening:[]}
  S.roadmaps.forEach(rm => {
    rm.months.forEach(mo => {
      mo.weeks.forEach(wk => {
        wk.days.forEach(t => {
          if (t.date === date) {
            const b = t.block || 'day'
            if (r[b]) r[b].push({...t, rmId:rm.id, moId:mo.id, wkId:wk.id, rmName:rm.name, rmColor:rm.color})
          }
        })
      })
    })
  })
  const st = S.daily[date] || {}
  BLOCKS.forEach(({key:b}) => {
    if (st[b]) r[b].push(...st[b].map(t => ({...t, standalone:true})))
  })
  return r
}

// ── FINDERS ──────────────────────────────────────────────
const findRm   = id  => S.roadmaps.find(r => r.id === id)
const findMo   = (rm, id) => rm.months.find(m => m.id === id)
const findWk   = (mo, id) => mo.weeks.find(w => w.id === id)
const findTask = (wk, id) => wk.days.find(d => d.id === id)

// ── MUTATIONS ────────────────────────────────────────────
function addRm(name, icon, color) {
  S.roadmaps.push({id:uid(), name, icon, color, months:[], created:Date.now()})
  formSt = null; persist(); render()
}
function addMonth(rmId, title, month, type) {
  const rm = findRm(rmId)
  if (!rm) return
  rm.months.push({id:uid(), title, month, type, weeks:[]})
  formSt = null; persist(); render()
}
function addWeek(rmId, moId, title, type, weekOf) {
  const rm = findRm(rmId); const mo = rm && findMo(rm, moId)
  if (!mo) return
  mo.weeks.push({id:uid(), title, type, weekOf: weekOf||td(), days:[]})
  formSt = null; persist(); render()
}
function addTask(rmId, moId, wkId, title, date, block, type, note, time, remind) {
  const rm = findRm(rmId); const mo = rm && findMo(rm, moId); const wk = mo && findWk(mo, wkId)
  if (!wk) return
  const task = {id:uid(), title, date: date||td(), block: block||'day', done:false, type: type||'task'}
  if (note)   task.note   = note
  if (time)   task.time   = time
  if (remind) task.remind = true
  wk.days.push(task)
  if (remind && time) scheduleReminder(title, time, note)
  formSt = null; persist(); render()
}
function toggleTask(rmId, moId, wkId, taskId) {
  const rm = findRm(rmId); const mo = rm && findMo(rm, moId)
  const wk = mo && findWk(mo, wkId); const t = wk && findTask(wk, taskId)
  if (t) { t.done = !t.done; persist(); render() }
}
function addStandalone(date, block, text, note, time, remind) {
  if (!S.daily[date]) S.daily[date] = {morning:[], day:[], evening:[]}
  if (!S.daily[date][block]) S.daily[date][block] = []
  const task = {id:uid(), text, done:false}
  if (note)   task.note   = note
  if (time)   task.time   = time
  if (remind) task.remind = true
  S.daily[date][block].push(task)
  if (remind && time) scheduleReminder(text, time, note)
  persist(); render()
}
function toggleStandalone(date, block, taskId) {
  const arr = (S.daily[date]||{})[block]||[]
  const t = arr.find(x => x.id === taskId)
  if (t) { t.done = !t.done; persist(); render() }
}
function toggleRoutine(date, routineId) {
  const st = loadDailyRtnState(date)
  st[routineId] = !st[routineId]
  saveDailyRtnState(date, st)
  render()
}
function updateRtnDailyNote(date, routineId, note) {
  const n = loadDailyRtnNotes(date)
  n[routineId] = note
  saveDailyRtnNotes(date, n)
}
function deleteRm(id) {
  if (!confirm('Delete this roadmap and all its data?')) return
  S.roadmaps = S.roadmaps.filter(r => r.id !== id)
  persist(); pop()
}
function saveNote(key, val) { S.notes[key] = val; persist() }

function addRoutine(day, title, note, time) {
  const routines = loadRoutines()
  routines[day].push({id:uid(), title, note:note||'', time:time||''})
  saveRoutines(routines); render()
}
function deleteRoutine(day, id) {
  const routines = loadRoutines()
  routines[day] = routines[day].filter(r => r.id !== id)
  saveRoutines(routines); render()
}

// ── REMINDERS ────────────────────────────────────────────
async function scheduleReminder(title, time, note) {
  if (!('Notification' in window)) return
  if (Notification.permission !== 'granted') {
    const res = await Notification.requestPermission()
    if (res !== 'granted') return
  }
  const [h, m] = time.split(':').map(Number)
  const now    = new Date()
  const target = new Date(now)
  target.setHours(h, m, 0, 0)
  const ms = target - now
  if (ms <= 0) return
  setTimeout(() => {
    try { new Notification(title, {body: note || 'Time for your task!', icon:'./icons/icon-192.png'}) } catch(e) {}
  }, ms)
}

// ── NAVIGATION ───────────────────────────────────────────
let stack  = [{view:'roadmaps'}]
let tabId  = 'roadmaps'
let formSt = null

function push(view, params) {
  stack.push({view, ...params})
  formSt = null; render()
}
function pop() {
  if (stack.length > 1) { stack.pop(); formSt = null; render() }
}
function goTab(id) {
  tabId = id; stack = [{view:id}]; formSt = null; render()
}
const curV = () => stack[stack.length-1]

// ── FORM STATE HELPERS ────────────────────────────────────
function openForm(type, extra) {
  formSt = {type, ...extra}; render()
  setTimeout(() => {
    const inp = document.querySelector('.form-wrap .inp, .form-wrap [autofocus]')
    if (inp) inp.focus()

}
function setProp(k, v) { if (formSt) { formSt[k] = v; render() } }
function closeForm()   { formSt = null; render() }

// ── SVG RING ─────────────────────────────────────────────
function ring(pct, hex) {
  const r=18, c=2*Math.PI*r, fill=(pct/100)*c
  return `<div class="ring-wrap">
    <svg width="52" height="52" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="${r}" stroke="var(--bg2)" stroke-width="4" fill="none"/>
      <circle cx="26" cy="26" r="${r}" stroke="${hex}" stroke-width="4" fill="none"
        stroke-dasharray="${fill.toFixed(1)} ${c.toFixed(1)}" stroke-linecap="round"/>
    </svg>
    <div class="ring-n" style="color:${hex}">${pct}%</div>
  </div>`
}

// ── RENDER: HEADER ────────────────────────────────────────
function renderHeader() {
  const v = curV(), back = stack.length > 1
  let title='', sub='', act=''

  if (v.view==='today') {
    title='Today'
    sub=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
  } else if (v.view==='roadmaps') {
    title='Roadmaps'
    act=`<button class="hdr-act" onclick="openForm('newRm',{color:'teal',icon:'💼'})">+ New</button>`
  } else if (v.view==='roadmap') {
    const rm=findRm(v.id)
    title=rm ? rm.name : 'Roadmap'
    act=`<button class="hdr-act" style="margin-right:6px" onclick="push('overview',{rmId:'${v.id}'})">Overview</button><button class="hdr-act" onclick="openForm('newMonth',{rmId:'${v.id}',gtype:'goal'})">+ Month</button>`
  } else if (v.view==='overview') {
    const rm=findRm(v.rmId)
    title=rm ? rm.name : 'Overview'
    sub='Overview'
  } else if (v.view==='month') {
    const rm=findRm(v.rmId), mo=rm&&findMo(rm,v.moId)
    title=mo ? mo.title : 'Month'
    sub=mo ? fmtMonth(mo.month) : ''
    act=`<button class="hdr-act" onclick="openForm('newWeek',{rmId:'${v.rmId}',moId:'${v.moId}',gtype:'goal'})">+ Week</button>`
  } else if (v.view==='week') {
    const rm=findRm(v.rmId), mo=rm&&findMo(rm,v.moId), wk=mo&&findWk(mo,v.wkId)
    title=wk ? wk.title : 'Week'
    sub=mo ? fmtMonth(mo.month) : ''
    act=`<button class="hdr-act" onclick="openForm('newTask',{rmId:'${v.rmId}',moId:'${v.moId}',wkId:'${v.wkId}',block:'day',gtype:'task'})">+ Task</button>`

  } else if (v.view==='now')      { title='Now'

  } else if (v.view==='settings') { title='Settings' }

  return `<div class="hdr"><div class="hdr-inner">
    ${back ? `<button class="hdr-back" onclick="pop()">Back</button>` : ''}
    <div class="hdr-titles">
      <div class="hdr-title">${title}</div>

// ── RENDER: TODAY ─────────────────────────────────────────
function renderToday() {
  const date      = td()
  const agg       = aggToday(date)
  const routines  = loadRoutines()
  const dayRtns   = routines[todayDayKey()] || []
  const rtnState  = loadDailyRtnState(date)
  const rtnNotes  = loadDailyRtnNotes(date)

  // Prepend routine tasks into their inferred block
  dayRtns.forEach(r => {
    const b = timeToBlock(r.time)
    agg[b].unshift({...r, isRoutine:true, done: rtnState[r.id]||false, dailyNote: rtnNotes[r.id]||''})
  })

  // Sort each block by time (no-time items sink to bottom)
  BLOCKS.forEach(({key:b}) => { agg[b] = sortByTime(agg[b]) })

  const all     = [...agg.morning,...agg.day,...agg.evening]
  const doneAll = all.filter(t=>t.done).length
  const pctAll  = all.length ? Math.round(doneAll/all.length*100) : 0

  let html = ''
  if (all.length) {
    html += `<div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:14px;font-weight:600">Day progress</span>
        <span style="font-size:14px;font-weight:700;color:var(--accent)">${doneAll}/${all.length}</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${pctAll}%;background:var(--accent)"></div></div>
    </div>`
  }

  BLOCKS.forEach(({key:b, label, time, emoji}) => {
    const tasks = agg[b]
    const done  = tasks.filter(t=>t.done).length
    const total = tasks.length
    const showF = formSt && formSt.type==='standalone' && formSt.block===b

    html += `<div class="blk">
      <div class="blk-hd">
        <div>
          <div class="blk-title">${emoji} ${label}</div>
          <div class="blk-time">${time}</div>
        </div>
        ${total>0 ? `<div class="blk-prog">${done}/${total}</div>` : ''}
      </div>
      ${total>0 ? `<div style="height:3px;background:var(--bg2);overflow:hidden"><div style="height:100%;width:${Math.round(done/total*100)}%;background:var(--accent);transition:width .4s"></div></div>` : ''}
      <div class="blk-body">
        ${tasks.map(t => {
          if (t.isRoutine) {
            return `<div class="item ${t.done?'done':''}">
              <div class="chk" onclick="toggleRoutine('${date}','${t.id}')"></div>
              <div class="item-body">
                <div class="item-title" onclick="toggleRoutine('${date}','${t.id}')">${esc(t.title)}${t.time?`<span class="item-time">${fmtTime(t.time)}</span>`:''}${t.remind?' 🔔':''}</div>
                <input class="rtn-note" placeholder="Note for today…" value="${esc(t.dailyNote)}"
                  oninput="updateRtnDailyNote('${date}','${t.id}',this.value)"
                  onclick="event.stopPropagation()">
              </div>
            </div>`
          } else if (t.standalone) {
            return `<div class="item ${t.done?'done':''}" onclick="toggleStandalone('${date}','${b}','${t.id}')">
              <div class="chk"></div>
              <div class="item-body">
                <div class="item-title">${esc(t.text)}${t.time?`<span class="item-time">${fmtTime(t.time)}</span>`:''}${t.remind?' 🔔':''}</div>
                ${t.note?`<div class="item-note">${esc(t.note)}</div>`:''}
              </div>
            </div>`
          } else {
            return `<div class="item ${t.done?'done':''}" onclick="toggleTask('${t.rmId}','${t.moId}','${t.wkId}','${t.id}')">
              <div class="chk"></div>
              <div class="item-body">
                <div class="item-title">${esc(t.title)}${t.time?`<span class="item-time">${fmtTime(t.time)}</span>`:''}${t.remind?' 🔔':''}</div>
                <div class="item-sub"><span class="badge" style="background:${COLOR_HEX[t.rmColor]}22;color:${COLOR_HEX[t.rmColor]}">${esc(t.rmName)}</span></div>
                ${t.note?`<div class="item-note">${esc(t.note)}</div>`:''}
              </div>
            </div>`
          }
        }).join('')}
        ${showF ? renderStandaloneForm(date, b)
          : `<button class="btn-ghost" onclick="openForm('standalone',{block:'${b}',remind:false})">Add task</button>`}
      </div>
    </div>`
  })
  return html
}

function renderMonthDetail(rmId, moId) {
  const rm = findRm(rmId), mo = rm && findMo(rm, moId)
  if (!mo) return '<div class="empty"><div class="empty-h">Not found</div></div>'
  const mp  = monthProg(mo)
  const hex = COLOR_HEX[rm.color] || 'var(--accent)'

  let html = `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:3px">${fmtMonth(mo.month)}</div>
        <div style="font-size:15px;font-weight:600">${esc(mo.title)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:22px;font-weight:700;color:${hex}">${mp.pct}%</div>
        <div style="font-size:12px;color:var(--text3)">${mp.done}/${mp.total} weeks done</div>
      </div>
    </div>
    <div class="bar"><div class="bar-fill" style="width:${mp.pct}%;background:${hex}"></div></div>
  </div>`

  if (formSt && formSt.type==='newWeek') html += renderFormNewWeek(rmId, moId)

  if (!mo.weeks.length && !formSt) {
    html += `<div class="empty"><div class="empty-ico">📆</div><div class="empty-h">No weekly goals yet</div><div class="empty-s">Tap "+ Week" to divide this month into weekly milestones.</div></div>`
    return html
  }

  mo.weeks.forEach((wk, i) => {
    const wp   = weekProg(wk)
    const done = wp.complete
    const wkLabel = wk.weekOf ? weekRange(wk.weekOf) : `Week ${i+1}`
    html += `<div class="card tappable" style="margin-bottom:8px" onclick="push('week',{rmId:'${rmId}',moId:'${moId}',wkId:'${wk.id}'})">
      <div class="g-row" style="padding:0 0 8px">
        <div class="g-info">
          <div class="g-title">${esc(wk.title)}<span class="badge" style="background:${wk.type==='goal'?'var(--a-bg)':'var(--bg2)'};color:${wk.type==='goal'?'var(--accent)':'var(--text3)'}">${wk.type==='goal'?'Goal':'Task'}</span></div>
          <div class="g-meta">📅 ${wkLabel} · ${wp.done}/${wp.total} tasks</div>
        </div>
        <div class="g-pct" style="color:${done?'#10b981':hex}">${done?'✓':wp.pct+'%'}</div>
        <div class="chevron">›</div>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${wp.pct}%;background:${hex}"></div></div>
    </div>`
  })
  return html
}

function renderFormNewWeek(rmId, moId) {
  const f = formSt
  const nextMon = nearestMonday(td())
  return `<div class="form-wrap">
    <div class="form-title">New Weekly Goal</div>
    <input class="inp" id="wk-title" placeholder="e.g. Set up dev environment" value="${esc(f.title||'')}" oninput="setProp('title',this.value)">
    <div class="sec-lbl" style="margin-bottom:4px">Week starting (Monday)</div>
    <input class="inp" id="wk-date" type="date" value="${f.weekOf||nextMon}" onchange="setProp('weekOf',this.value)">
    <div class="sec-lbl" style="margin-bottom:6px">Category</div>
    <div class="row-wrap">
      <button class="chip ${(!f.gtype||f.gtype==='goal')?'on':''}" onclick="setProp('gtype','goal')">🎯 Goal</button>
      <button class="chip ${f.gtype==='task'?'on':''}" onclick="setProp('gtype','task')">✅ Task</button>
    </div>
    <div class="row">
      <button class="btn btn-acc" onclick="submitNewWeek('${rmId}','${moId}')">Add</button>
      <button class="btn" onclick="closeForm()">Cancel</button>
    </div>
  </div>`
}

// ── RENDER: WEEK DETAIL ───────────────────────────────────
function renderWeekDetail(rmId, moId, wkId) {
  const rm=findRm(rmId), mo=rm&&findMo(rm,moId), wk=mo&&findWk(mo,wkId)
  if (!wk) return '<div class="empty"><div class="empty-h">Not found</div></div>'
  const wp      = weekProg(wk)
  const hex     = COLOR_HEX[rm.color] || 'var(--accent)'
  const wkN     = mo.weeks.findIndex(w=>w.id===wkId) + 1
  const wkLabel = wk.weekOf ? weekRange(wk.weekOf) : `Week ${wkN}`

  let html = `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:3px">📅 ${wkLabel}</div>
        <div style="font-size:15px;font-weight:600">${esc(wk.title)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:22px;font-weight:700;color:${hex}">${wp.pct}%</div>
        <div style="font-size:12px;color:var(--text3)">${wp.done}/${wp.total} tasks</div>
      </div>
    </div>
    <div class="bar"><div class="bar-fill" style="width:${wp.pct}%;background:${hex}"></div></div>
  </div>`

  if (formSt && formSt.type==='newTask') html += renderFormNewTask(rmId, moId, wkId)

  if (!wk.days.length && !formSt) {
    html += `<div class="empty"><div class="empty-ico">✅</div><div class="empty-h">No tasks yet</div><div class="empty-s">Tap "+ Task" to add daily tasks. Assign them to dates and time blocks.</div></div>`
    return html
  }

  const byDate = {}
  wk.days.forEach(t => { if (!byDate[t.date]) byDate[t.date]=[]; byDate[t.date].push(t) })
  Object.keys(byDate).sort().forEach(date => {
    const tasks = sortByTime(byDate[date])
    const dn    = tasks.filter(t=>t.done).length
    html += `<div class="sec-row"><div class="sec-lbl">${fmtDate(date)}</div><div class="sec-lbl">${dn}/${tasks.length}</div></div>
    <div class="card" style="margin-bottom:8px">${tasks.map(t => {
      const bl = BLOCKS.find(b=>b.key===t.block)
      return `<div class="item ${t.done?'done':''}" onclick="toggleTask('${rmId}','${moId}','${wkId}','${t.id}')">
        <div class="chk"></div>
        <div class="item-body">
          <div class="item-title">${esc(t.title)}${t.time?`<span class="item-time">${fmtTime(t.time)}</span>`:''}${t.remind?' 🔔':''}</div>
          ${bl ? `<div class="item-sub">${bl.emoji} ${bl.label} · <span class="badge" style="background:${t.type==='goal'?'var(--a-bg)':'var(--bg2)'};color:${t.type==='goal'?'var(--accent)':'var(--text3)'}">${t.type==='goal'?'Goal':'Task'}</span></div>` : ''}
          ${t.note?`<div class="item-note">${esc(t.note)}</div>`:''}
        </div>
      </div>`
    }).join('')}</div>`
  })
  return html
}

function renderFormNewTask(rmId, moId, wkId) {
  const f = formSt
  const hasNotif = 'Notification' in window
  return `<div class="form-wrap">
    <div class="form-title">New Daily Task</div>
    <input class="inp" id="t-title" placeholder="e.g. Install CUDA toolkit" value="${esc(f.title||'')}" oninput="setProp('title',this.value)">
    <input class="inp" id="t-note" placeholder="Note (optional)" value="${esc(f.note||'')}" oninput="setProp('note',this.value)">
    <input class="inp" id="t-date" type="date" value="${f.date||td()}" onchange="setProp('date',this.value)">
    <input class="inp" id="t-time" type="time" value="${f.time||''}" onchange="setProp('time',this.value)">
    <div class="sec-lbl" style="margin-bottom:6px">Time Block</div>
    <div class="row-wrap">${BLOCKS.map(b =>
      `<button class="chip ${(f.block||'day')===b.key?'on':''}" onclick="setProp('block','${b.key}')">${b.emoji} ${b.label}</button>`).join('')}
    </div>
    <div class="sec-lbl" style="margin-bottom:6px">Category</div>
    <div class="row-wrap">
      <button class="chip ${(!f.gtype||f.gtype==='task')?'on':''}" onclick="setProp('gtype','task')">✅ Task</button>
      <button class="chip ${f.gtype==='goal'?'on':''}" onclick="setProp('gtype','goal')">🎯 Goal</button>
    </div>
    ${hasNotif ? `<div class="row-wrap" style="margin-bottom:10px;align-items:center">
      <button class="chip ${f.remind?'on':''}" onclick="setProp('remind',${!f.remind})">🔔 Remind me</button>
      <span style="font-size:11px;color:var(--text3)">Requires app open</span>
    </div>` : ''}
    <div class="row">
      <button class="btn btn-acc" onclick="submitNewTask('${rmId}','${moId}','${wkId}')">Add</button>
      <button class="btn" onclick="closeForm()">Cancel</button>

  </div>`
}

// ── RENDER: PROGRESS ──────────────────────────────────────
function renderProgress() {
  if (!S.roadmaps.length) {
    return `<div class="empty"><div class="empty-ico">📊</div><div class="empty-h">Nothing to track yet</div><div class="empty-s">Create a roadmap to start seeing your progress here.</div></div>`
  }

  let totalTasks=0, doneTasks=0
  S.roadmaps.forEach(rm => rm.months.forEach(mo => mo.weeks.forEach(wk => {
    totalTasks += wk.days.length
    doneTasks  += wk.days.filter(d=>d.done).length
  })))

  let html = `<div class="stats">
    <div class="stat"><div class="stat-n" style="color:var(--accent)">${S.roadmaps.length}</div><div class="stat-l">Roadmaps</div></div>
    <div class="stat"><div class="stat-n">${totalTasks}</div><div class="stat-l">Total tasks</div></div>
    <div class="stat"><div class="stat-n" style="color:#10b981">${doneTasks}</div><div class="stat-l">Completed</div></div>
  </div>`

  S.roadmaps.forEach(rm => {
    const prog = rmProg(rm)
    const hex  = COLOR_HEX[rm.color] || 'var(--accent)'
    html += `<div class="card tappable" onclick="goTab('roadmaps');push('roadmap',{id:'${rm.id}'})" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        ${ring(prog.pct, hex)}
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:2px">
            <span style="font-size:18px">${rm.icon}</span>
            <span style="font-size:15px;font-weight:600">${esc(rm.name)}</span>
          </div>
          <div style="font-size:12px;color:var(--text3)">${rm.months.length} months · ${rm.months.reduce((s,m)=>s+m.weeks.length,0)} weeks</div>
        </div>
      </div>
      ${rm.months.map(mo => {
        const mp = monthProg(mo)
        return `<div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:12px;color:var(--text2)">${esc(mo.title)}</span>
            <span style="font-size:12px;font-weight:700;color:${hex}">${mp.complete?'✓ Done':mp.pct+'%'}</span>
          </div>
          <div class="bar"><div class="bar-fill" style="width:${mp.pct}%;background:${hex}"></div></div>
        </div>`
      }).join('')}
    </div>`
  })
  return html
}

// ── RENDER: NOTES ─────────────────────────────────────────
function renderNotes() {
  const n = S.notes
  return `
    <div class="card"><div class="card-title">This week's wins</div>
      <textarea class="ta" rows="4" placeholder="What went well? Even small things count…" oninput="saveNote('wins',this.value)">${n.wins||''}</textarea>
    </div>
    <div class="card"><div class="card-title">What's hard right now</div>
      <textarea class="ta" rows="4" placeholder="Write it out — naming it helps." oninput="saveNote('hard',this.value)">${n.hard||''}</textarea>
    </div>
    <div class="card"><div class="card-title">Next adjustment</div>
      <textarea class="ta" rows="3" placeholder="One small change for next week?" oninput="saveNote('adjust',this.value)">${n.adjust||''}</textarea>
    </div>
    <div class="card"><div class="card-title">Ideas to revisit</div>
      <textarea class="ta" rows="4" placeholder="Questions, sparks, things to come back to…" oninput="saveNote('ideas',this.value)">${n.ideas||''}</textarea>
    </div>`
}

// ── RENDER: NOW ───────────────────────────────────────────
function renderNow() {
  const curMonth = td().slice(0,7)
  const {mon, sun} = thisWeekBounds()
  let html = ''

  // 1. This Month
  html += `<div class="sec-lbl" style="margin-top:0">This Month — ${fmtMonth(curMonth)}</div>`
  const monthGroups = []
  S.roadmaps.forEach(rm => {
    const months = rm.months.filter(mo => mo.month === curMonth)
    if (months.length) monthGroups.push({rm, months})
  })
  if (!monthGroups.length) {
    html += `<div class="card" style="margin-bottom:14px"><div style="text-align:center;padding:10px 0;font-size:13px;color:var(--text3)">No goals set for this month</div></div>`
  } else {
    monthGroups.forEach(({rm, months}) => {
      const hex = COLOR_HEX[rm.color] || 'var(--accent)'
      html += `<div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:18px">${rm.icon}</span>
          <span style="font-size:13px;font-weight:600;color:${hex}">${esc(rm.name)}</span>
        </div>
        ${months.map(mo => `<div style="font-size:13px;color:var(--text2);padding:5px 0;border-bottom:.5px solid var(--border)">→ ${esc(mo.title)}</div>`).join('')}
      </div>`
    })
  }

  // 2. This Week
  html += `<div class="sec-lbl">This Week — ${weekRange(mon)}</div>`
  const weekGroups = []
  S.roadmaps.forEach(rm => {
    const tasks = []
    rm.months.forEach(mo => mo.weeks.forEach(wk => wk.days.forEach(t => {
      if (t.date >= mon && t.date <= sun) tasks.push(t)
    })))
    if (tasks.length) weekGroups.push({rm, tasks: sortByTime(tasks)})
  })
  if (!weekGroups.length) {
    html += `<div class="card" style="margin-bottom:14px"><div style="text-align:center;padding:10px 0;font-size:13px;color:var(--text3)">No tasks scheduled this week</div></div>`
  } else {
    weekGroups.forEach(({rm, tasks}) => {
      const hex = COLOR_HEX[rm.color] || 'var(--accent)'
      html += `<div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:18px">${rm.icon}</span>
          <span style="font-size:13px;font-weight:600;color:${hex}">${esc(rm.name)}</span>
        </div>
        ${tasks.map(t => {
          const bl = BLOCKS.find(b=>b.key===t.block)
          return `<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border)">
            <div style="width:14px;height:14px;border-radius:50%;border:1.5px solid ${t.done?hex:'var(--borderB)'};background:${t.done?hex:'transparent'};flex-shrink:0;margin-top:2px"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;color:${t.done?'var(--text3)':'var(--text2)'};${t.done?'text-decoration:line-through':''}">${esc(t.title)}${t.time?`<span class="item-time">${fmtTime(t.time)}</span>`:''}</div>
              <div style="font-size:11px;color:var(--text3)">${fmtDate(t.date)}${bl?' · '+bl.emoji+' '+bl.label:''}</div>
            </div>
          </div>`
        }).join('')}
      </div>`
    })
  }

  // 3. Today's Routines
  const dayKey  = todayDayKey()
  const dayRtns = (loadRoutines()[dayKey] || [])
  html += `<div class="sec-lbl">Today's Routines — ${DAYS_LABEL[dayKey]}</div>`
  if (!dayRtns.length) {
    html += `<div class="card" style="margin-bottom:14px"><div style="text-align:center;padding:10px 0;font-size:13px;color:var(--text3)">No routines set for ${DAYS_LABEL[dayKey]}</div></div>`
  } else {
    html += `<div class="card" style="margin-bottom:14px">
      ${dayRtns.map(r => `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)">
        <span style="font-size:12px;color:var(--text3);min-width:44px;margin-top:2px">${r.time?fmtTime(r.time):'—'}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500">${esc(r.title)}</div>
          ${r.note?`<div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(r.note)}</div>`:''}
        </div>
      </div>`).join('')}
    </div>`
  }

  return html
}

// ── RENDER: SETTINGS ──────────────────────────────────────
function renderSettings() {
  const routines = loadRoutines()
  const n = S.notes
  let html = `<div class="sec-lbl" style="margin-top:0;margin-bottom:12px">Reflections</div>
    <div class="card"><div class="card-title">This week's wins</div>
      <textarea class="ta" rows="4" placeholder="What went well? Even small things count…" oninput="saveNote('wins',this.value)">${n.wins||''}</textarea>
    </div>
    <div class="card"><div class="card-title">What's hard right now</div>
      <textarea class="ta" rows="4" placeholder="Write it out — naming it helps." oninput="saveNote('hard',this.value)">${n.hard||''}</textarea>
    </div>
    <div class="card"><div class="card-title">Next adjustment</div>
      <textarea class="ta" rows="3" placeholder="One small change for next week?" oninput="saveNote('adjust',this.value)">${n.adjust||''}</textarea>
    </div>
    <div class="card" style="margin-bottom:20px"><div class="card-title">Ideas to revisit</div>
      <textarea class="ta" rows="4" placeholder="Questions, sparks, things to come back to…" oninput="saveNote('ideas',this.value)">${n.ideas||''}</textarea>
    </div>
  <div class="sec-lbl" style="margin-bottom:12px">Daily Routines</div>`

  DAYS_ORDERED.forEach(day => {
    const list    = routines[day] || []
    const showForm = formSt && formSt.type==='newRoutine' && formSt.day===day
    html += `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center${list.length||showForm?';margin-bottom:10px':''}">
        <div style="font-size:14px;font-weight:600">${DAYS_LABEL[day]}</div>
        <button class="btn btn-sm" onclick="openForm('newRoutine',{day:'${day}',remind:false})">+ Add</button>
      </div>
      ${list.map(r => `
        <div style="display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:.5px solid var(--border)">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:500">${esc(r.title)}${r.time?`<span class="item-time">${fmtTime(r.time)}</span>`:''}</div>
            ${r.note?`<div class="item-note">${esc(r.note)}</div>`:''}
          </div>
          <button class="btn-del" onclick="deleteRoutine('${day}','${r.id}')">✕</button>
        </div>`).join('')}
      ${showForm ? `<div style="padding-top:10px${list.length?';border-top:.5px solid var(--border)':''}">
        <input class="inp" id="rt-title" placeholder="Routine title" style="margin-bottom:6px">
        <input class="inp" id="rt-note"  placeholder="Note (optional)" style="margin-bottom:6px">
        <input class="inp" id="rt-time"  type="time" style="margin-bottom:8px">
        <div class="row">
          <button class="btn btn-acc btn-sm" onclick="submitNewRoutine('${day}')">Add</button>
          <button class="btn btn-sm" onclick="closeForm()">Cancel</button>
        </div>
      </div>` : ''}
    </div>`
  })
  return html
}

// ── SUBMIT HANDLERS ───────────────────────────────────────
function submitNewRm() {
  const name = document.getElementById('rm-name')?.value.trim()
  if (!name) { document.getElementById('rm-name')?.focus(); return }
  addRm(name, formSt.icon||'💼', formSt.color||'teal')
}
function submitNewMonth(rmId) {
  const title  = document.getElementById('mo-title')?.value.trim()
  const period = document.getElementById('mo-period')?.value || td().slice(0,7)
  if (!title) { document.getElementById('mo-title')?.focus(); return }
  addMonth(rmId, title, period, formSt.gtype||'goal')
}
function submitNewWeek(rmId, moId) {
  const title  = document.getElementById('wk-title')?.value.trim()
  const weekOf = document.getElementById('wk-date')?.value || nearestMonday(td())
  if (!title) { document.getElementById('wk-title')?.focus(); return }
  addWeek(rmId, moId, title, formSt.gtype||'goal', weekOf)
}
function submitNewTask(rmId, moId, wkId) {
  const title = document.getElementById('t-title')?.value.trim()
  const note  = document.getElementById('t-note')?.value.trim()
  const date  = document.getElementById('t-date')?.value || td()
  const time  = document.getElementById('t-time')?.value || ''
  if (!title) { document.getElementById('t-title')?.focus(); return }
  addTask(rmId, moId, wkId, title, date, formSt.block||'day', formSt.gtype||'task', note, time, formSt.remind||false)
}
function submitStandalone(date, block) {
  const inp  = document.getElementById('sa-inp')
  const text = inp?.value.trim()
  const note = document.getElementById('sa-note')?.value.trim()
  const time = document.getElementById('sa-time')?.value || ''
  if (!text) { inp?.focus(); return }
  addStandalone(date, block, text, note, time, formSt?.remind||false)
}
function submitNewRoutine(day) {
  const title = document.getElementById('rt-title')?.value.trim()
  const note  = document.getElementById('rt-note')?.value.trim()
  const time  = document.getElementById('rt-time')?.value || ''
  if (!title) { document.getElementById('rt-title')?.focus(); return }
  addRoutine(day, title, note, time)
}

// ── SAFETY: escape user text in HTML ─────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── MAIN RENDER ───────────────────────────────────────────
function render() {
  const v = curV()
  let content = ''
  switch(v.view) {
    case 'today':    content = renderToday(); break
    case 'roadmaps': content = renderRoadmaps(); break
    case 'roadmap':  content = renderRoadmapDetail(v.id); break
    case 'month':    content = renderMonthDetail(v.rmId, v.moId); break
    case 'week':     content = renderWeekDetail(v.rmId, v.moId, v.wkId); break
    case 'overview': content = renderOverview(v.rmId); break
    case 'progress': content = renderProgress(); break
    case 'now':      content = renderNow(); break
    case 'settings': content = renderSettings(); break
  }
  document.getElementById('root').innerHTML =
    renderHeader() +
    `<div class="content">${content}</div>` +
    renderNav()
}

// ── BOOT ──────────────────────────────────────────────────
loadState()
render()
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {})
